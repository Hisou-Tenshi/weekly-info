name: Journal Club mail (JST Tue 12:00)

on:
  schedule:
    # JST 12:00 Tuesday == UTC 03:00 Tuesday
    - cron: "0 3 * * 2"
  workflow_dispatch:
    inputs:
      send_only:
        description: "Send mail now without changing state"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  send-weekly-mail:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Send Journal Club mail (rotate/hold weekly)
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          JC_TO: ${{ secrets.JC_TO }}
          JC_RSA_PRIVATE_KEY_PEM: ${{ secrets.JC_RSA_PRIVATE_KEY_PEM }}
        run: |
          if [ "${{ github.event.inputs.send_only }}" = "true" ]; then
            python journal_club.py --send-only
          else
            python journal_club.py
          fi

      - name: Commit updated state.json (if changed)
        run: |
          if git diff --quiet -- state.json; then
            echo "state.json unchanged"
            exit 0
          fi
          git add state.json
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "chore: update state.json"
          git push


